  <!--  Project hover  -->
  <script>
let splitType = new SplitType("[hoverstagger='text']", {
  types: "words,chars",
  tagName: "span"
});
$("[hoverstagger='link']").each(function (index) {
  let text1 = $(this).find("[hoverstagger='text']").eq(0);
  let text2 = $(this).find("[hoverstagger='text']").eq(1);
  let tl = gsap.timeline({ paused: true });
  tl.to(text1.find(".char"), { ease: "power2.out", yPercent: -100, duration: 0.35, stagger: { amount: 0.2 } });
  tl.from(text2.find(".char"), { ease: "power2.out", yPercent: 100, duration: 0.35, stagger: { amount: 0.2 } }, 0);
  $(this).on("mouseenter", function () {
    tl.restart();
  });
  $(this).on("mouseleave", function () {
    tl.reverse();
  });
});
</script>
  <script>
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll("[data-word-reveal='true']").forEach((text) => {
    const split = SplitText.create(text.children, {
      type: "words, chars",
      mask: "words",
      wordsClass: "word",
      charsClass: "char",
    });
    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: text,
        start: "top bottom",
        end: "top 80%",
        toggleActions: "none play none reset",
      },
    });
    tl.from(split.words, {
      yPercent: 110,
      delay: 0.15,
      duration: 0.5,
      stagger: { amount: 0.35 },
      ease: "power2.out"
    });
    gsap.set(text, { autoAlpha: 1 });
  });
});
</script>
